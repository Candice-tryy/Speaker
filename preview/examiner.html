<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Speaking · 考官模拟</title>
<style>
  :root{
    --green:#3FC196; --green-deep:#2E9C97; --green-text:#1E7A66;
    --acc:#9B82DC; --acc-deep:#6E54B8; --acc-soft:#E7DEF8;
    --coral:var(--acc); --coral-deep:var(--acc-deep); --coral-text:var(--acc-deep);
    --coral-soft:var(--acc-soft); --halo:var(--acc-soft);
    --ink:#3F5C50; --muted:#7C9A8D; --faint:#A6C0B7;
    --mint-1:#EAF7F1; --mint-2:#DCEFE7; --line:#E9F2EE;
    --exam:#5C7B72;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; height:100%;}
  body{background:#DCEBE6; font-family:Inter,"PingFang SC","Microsoft YaHei",Arial,sans-serif;
       color:var(--ink); display:grid; place-items:center; min-height:100vh; padding:18px;}

  .phone{width:340px; height:720px; position:relative; overflow:hidden; border-radius:38px;
    border:2px solid #fff; box-shadow:0 0 0 1px var(--line), 0 30px 70px rgba(40,90,72,.22);
    background:linear-gradient(180deg,#EEF6FB 0%,#F4FAF8 55%,#FFF8F3 100%);
    display:flex; flex-direction:column;}

  /* top */
  .top{display:flex;align-items:center;gap:11px;padding:16px 18px 12px;border-bottom:1px solid var(--line);background:rgba(255,255,255,.6);}
  .back{width:34px;height:34px;border-radius:12px;background:#fff;border:1px solid var(--line);
        display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--green-deep);flex:none;}
  .back svg{width:18px;height:18px;}
  .av{width:38px;height:38px;border-radius:50%;background:var(--exam);display:flex;align-items:center;justify-content:center;font-size:20px;flex:none;}
  .who .n{font-size:14px;font-weight:600;color:#2E4D44;}
  .who .s{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:5px;}
  .who .s .live{width:6px;height:6px;border-radius:50%;background:var(--green);}
  .qcount{margin-left:auto;font-size:11px;color:var(--muted);background:#fff;border:1px solid var(--line);padding:4px 10px;border-radius:20px;}

  /* chat */
  .chat{flex:1;overflow-y:auto;padding:16px 16px 8px;display:flex;flex-direction:column;gap:12px;}
  .chat::-webkit-scrollbar{display:none;}
  .row{display:flex;gap:8px;max-width:88%;animation:pop .3s ease;}
  @keyframes pop{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
  .row .mini{width:26px;height:26px;border-radius:50%;background:var(--exam);display:flex;align-items:center;justify-content:center;font-size:14px;flex:none;align-self:flex-end;}
  .bub{padding:11px 14px;font-size:14px;line-height:1.55;border-radius:18px;}
  .row.ex .bub{background:#fff;border:1px solid var(--line);border-bottom-left-radius:6px;color:#37524B;}
  .row.me{align-self:flex-end;}
  .row.me .bub{background:var(--coral);color:#fff;border-bottom-right-radius:6px;}
  .tag{font-size:10px;font-weight:600;color:var(--coral);margin-bottom:3px;}
  .typing{display:flex;gap:4px;padding:13px 15px;}
  .typing i{width:7px;height:7px;border-radius:50%;background:var(--faint);animation:blink 1.2s infinite;}
  .typing i:nth-child(2){animation-delay:.2s;}.typing i:nth-child(3){animation-delay:.4s;}
  @keyframes blink{0%,60%,100%{opacity:.3;transform:translateY(0);}30%{opacity:1;transform:translateY(-3px);}}

  /* dock */
  .dock{padding:12px 18px 22px;}
  .hint{text-align:center;font-size:11px;color:var(--muted);margin-bottom:10px;min-height:15px;}
  .recwrap{display:flex;justify-content:center;}
  .rec{width:72px;height:72px;border-radius:50%;border:none;cursor:pointer;position:relative;
       background:var(--acc);box-shadow:0 10px 26px rgba(110,84,184,.38);display:flex;
       align-items:center;justify-content:center;color:#fff;transition:transform .15s;}
  .rec:disabled{background:var(--mint-2);box-shadow:none;color:var(--faint);cursor:default;}
  .rec:active:not(:disabled){transform:scale(.94);}
  .rec svg{width:28px;height:28px;}
  .rec.recording{background:var(--coral-deep);}
  .ring{position:absolute;inset:-9px;border-radius:50%;border:3px solid var(--halo);opacity:0;}
  .rec.recording .ring{animation:ring 1.3s ease-out infinite;}
  @keyframes ring{0%{opacity:.8;transform:scale(.85);}100%{opacity:0;transform:scale(1.4);}}

  /* result */
  .mask{position:absolute;inset:0;background:rgba(40,77,68,.34);opacity:0;pointer-events:none;transition:.3s;z-index:30;}
  .mask.show{opacity:1;pointer-events:auto;}
  .result{position:absolute;left:0;right:0;bottom:0;background:#fff;border-radius:30px 30px 0 0;
    padding:12px 24px 26px;transform:translateY(110%);transition:transform .4s cubic-bezier(.4,0,.2,1);z-index:31;text-align:center;}
  .result.show{transform:translateY(0);}
  .grab{width:40px;height:4px;border-radius:4px;background:var(--mint-2);margin:4px auto 16px;}
  .result .crown{font-size:34px;}
  .result h3{margin:6px 0 2px;font-size:17px;font-weight:600;color:#2E4D44;}
  .result .seg{font-size:12px;color:var(--muted);}
  .bigband{margin:14px 0 4px;font-size:54px;font-weight:700;color:var(--green-deep);line-height:1;}
  .bandlbl{font-size:12px;color:var(--muted);}
  .dims{display:flex;gap:8px;margin:16px 0;}
  .dim{flex:1;background:var(--mint-1);border-radius:12px;padding:9px 6px;}
  .dim .dl{font-size:10px;color:var(--muted);}
  .dim .dv{font-size:15px;font-weight:600;color:var(--green-text);margin-top:2px;}
  .advice{background:var(--coral-soft);border-radius:14px;padding:12px 13px;font-size:13px;line-height:1.5;
    color:var(--coral-text);display:flex;gap:8px;text-align:left;}
  .advice svg{width:16px;height:16px;flex:none;margin-top:1px;}
  .done-btn{margin-top:18px;width:100%;border:none;border-radius:16px;padding:15px;background:var(--green);
    color:#fff;font-family:inherit;font-size:15px;font-weight:600;cursor:pointer;box-shadow:0 10px 24px rgba(52,204,158,.4);}
  .done-btn:active{transform:scale(.98);}

  .toast{position:absolute;left:50%;bottom:110px;transform:translateX(-50%) translateY(10px);
    background:#2E4D44;color:#fff;font-size:12.5px;padding:9px 15px;border-radius:14px;opacity:0;
    pointer-events:none;transition:.3s;z-index:40;box-shadow:0 8px 22px rgba(0,0,0,.18);max-width:260px;text-align:center;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="phone">

  <div class="top">
    <button class="back" aria-label="返回地图" onclick="goMap(false)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <div class="av">🧑‍🏫</div>
    <div class="who">
      <div class="n">考官模拟考</div>
      <div class="s"><span class="live"></span><span id="sub">Part 2 · Hometown</span></div>
    </div>
    <div class="qcount" id="qcount">第 1 / 4 问</div>
  </div>

  <div class="chat" id="chat"></div>

  <div class="dock">
    <div class="hint" id="hint">考官正在提问…</div>
    <div class="recwrap">
      <button class="rec" id="rec" disabled>
        <span class="ring"></span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10a7 7 0 0 0 14 0"/><path d="M12 17v4"/></svg>
      </button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <div class="mask" id="mask"></div>
  <div class="result" id="result">
    <div class="grab"></div>
    <div class="crown">👑</div>
    <h3 id="rTitle">Boss 通过！</h3>
    <div class="seg" id="rSeg">Part 2 · Hometown · 考官模拟</div>
    <div class="bigband" id="rBand">6.5</div>
    <div class="bandlbl">Overall band</div>
    <div class="dims">
      <div class="dim"><div class="dl">Fluency</div><div class="dv">6.5</div></div>
      <div class="dim"><div class="dl">Vocabulary</div><div class="dv">6.5</div></div>
      <div class="dim"><div class="dl">Coherence</div><div class="dv">6.0</div></div>
    </div>
    <div class="advice">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18h6M10 22h4M12 2a7 7 0 0 1 4 12c-.7.7-1 1.3-1 2H9c0-.7-.3-1.3-1-2A7 7 0 0 1 12 2z"/></svg>
      <span id="rAdvice">如果只改一件事：追问时先用一句话直接回答，再补理由，逻辑会更清晰。</span>
    </div>
    <button class="done-btn" onclick="goMap(true)">登顶这座峰 ✦</button>
  </div>

</div>

<script>
const $ = s => document.querySelector(s);

const U = new URLSearchParams(location.search);
const ctx = {
  p:U.get('p')??'1', pk:U.get('pk')??'0', n:U.get('n')??'3',
  part:U.get('part')||'Part 2', peak:U.get('peak')||'Hometown'
};
const ACCENTS = [
  {a:'#EC7CA8', d:'#C9537F', s:'#FBDEEA'},
  {a:'#9B82DC', d:'#6E54B8', s:'#E7DEF8'},
  {a:'#5DAEE6', d:'#3585C2', s:'#D7EAF9'},
];
(function(){
  const acc = ACCENTS[Math.min(parseInt(ctx.pk)||0, ACCENTS.length-1)];
  document.documentElement.style.setProperty('--acc', acc.a);
  document.documentElement.style.setProperty('--acc-deep', acc.d);
  document.documentElement.style.setProperty('--acc-soft', acc.s);
})();
$('#sub').textContent = `${ctx.part} · ${ctx.peak}`;
$('#rSeg').textContent = `${ctx.part} · ${ctx.peak} · 考官模拟`;

const SCRIPT = [
  { q:`Let's talk about ${ctx.peak.toLowerCase()}. Could you tell me a bit about where you live?`, react:'Mm, I see.' },
  { q:`And what do you usually do there in your free time?`, react:'That sounds nice.' },
  { q:`Has it changed much over the past few years?`, react:'Interesting.' },
  { q:`Finally — would you like to live somewhere else in the future? Why?`, react:'' },
];

let qi = 0;
const chat = $('#chat'), rec = $('#rec'), hint = $('#hint');
let tT; function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('show');clearTimeout(tT);tT=setTimeout(()=>t.classList.remove('show'),1600);}
function scrollChat(){ chat.scrollTo({top:chat.scrollHeight,behavior:'smooth'}); }

function addEx(text, tag){
  const row=document.createElement('div');row.className='row ex';
  row.innerHTML=`<div class="mini">🧑‍🏫</div><div><div class="bub">${tag?`<div class="tag">${tag}</div>`:''}${text}</div></div>`;
  chat.appendChild(row);scrollChat();
}
function addMe(text){
  const row=document.createElement('div');row.className='row me';
  row.innerHTML=`<div class="bub">${text}</div>`;chat.appendChild(row);scrollChat();
}
function typing(cb){
  const row=document.createElement('div');row.className='row ex';
  row.innerHTML=`<div class="mini">🧑‍🏫</div><div class="bub typing"><i></i><i></i><i></i></div>`;
  chat.appendChild(row);scrollChat();
  setTimeout(()=>{row.remove();cb();},1100);
}

function askNext(){
  $('#qcount').textContent = `第 ${qi+1} / ${SCRIPT.length} 问`;
  hint.textContent='考官正在提问…'; rec.disabled=true;
  typing(()=>{
    addEx(SCRIPT[qi].q, qi===0?'Examiner':'');
    hint.textContent='长按下方按钮，语音作答'; rec.disabled=false;
  });
}

// record (hold)
let holding=false;
function startRec(e){ if(rec.disabled)return; e.preventDefault();holding=true;rec.classList.add('recording');hint.textContent='录音中… 松手提交回答'; }
function endRec(){
  if(!holding)return;holding=false;rec.classList.remove('recording');rec.disabled=true;
  addMe('（你的语音回答已记录）');
  hint.textContent='考官在思考…';
  const react = SCRIPT[qi].react;
  qi++;
  setTimeout(()=>{
    if(react) typing(()=>{ addEx(react); setTimeout(()=>{ qi<SCRIPT.length?askNext():finish(); }, 500); });
    else { qi<SCRIPT.length?askNext():finish(); }
  }, 500);
}
rec.addEventListener('mousedown',startRec);
rec.addEventListener('touchstart',startRec,{passive:false});
window.addEventListener('mouseup',endRec);
window.addEventListener('touchend',endRec);

function finish(){
  hint.textContent='考官评分中…';
  typing(()=>{
    addEx('Thank you, that is the end of this part. Here is your result.');
    setTimeout(()=>{ $('#mask').classList.add('show'); $('#result').classList.add('show'); }, 600);
  });
}

function goMap(done){
  const qs = `?p=${ctx.p}&pk=${ctx.pk}&n=${ctx.n}`
    + `&topic=${encodeURIComponent('Examiner')}`
    + (done?'&done=1':'');
  location.href = 'climbing-map.html' + qs;
}

// kick off
setTimeout(askNext, 400);
</script>
</body>
</html>
