<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Speaking · 登山地图</title>
<style>
  :root{
    --green:#3FC196; --green-deep:#2E9C97; --green-text:#1E7A66;
    --acc:#F0875A; --acc-deep:#C75A2C; --acc-soft:#FCE3D7;
    --yellow:#F6C84F; --yellow-deep:#C98D16; --yellow-soft:#FFF3C8;
    --blue:#5DAEE6; --blue-deep:#3585C2; --blue-soft:#D7EAF9;
    --ink:#3F5C50; --muted:#7C9A8D; --faint:#A6C0B7;
    --node-lock:#BBD8CB; --line:#E4EFE9;
    --glass:rgba(255,255,255,.72);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; height:100%;}
  body{background:#CFE3DB; font-family:Inter,"PingFang SC","Microsoft YaHei",Arial,sans-serif;
       color:var(--ink); display:grid; place-items:center; min-height:100vh; padding:18px;}

  .phone{width:340px; height:720px; position:relative; overflow:hidden; border-radius:38px;
    border:2px solid #fff; box-shadow:0 0 0 1px #DCE9E2, 0 30px 70px rgba(40,90,72,.22);
    background:linear-gradient(180deg,#8FD3EF 0%,#AEE0F2 24%,#D4EFEC 54%,#E9F7E4 76%,#F4EFDF 100%);
    transition:background .7s ease;}

  .stage{position:absolute; inset:0; z-index:1;}
  .scene{position:absolute; inset:0; transition:transform .55s cubic-bezier(.4,.05,.2,1), opacity .4s;}
  .scene.exit-up{transform:translateY(-20px) scale(1.06); opacity:0;}
  .scene.enter-down{transform:translateY(22px) scale(1.06); opacity:0;}
  svg.map{width:100%; height:100%; display:block;}

  .cloud{animation:drift 16s ease-in-out infinite;}
  .cloud.c2{animation-duration:23s; animation-delay:-6s;}
  @keyframes drift{0%,100%{transform:translateX(0);}50%{transform:translateX(20px);}}
  .bird1{animation:fly1 17s linear infinite;}
  .bird2{animation:fly2 23s linear infinite; animation-delay:-7s;}
  .bird3{animation:fly3 20s linear infinite; animation-delay:-13s;}
  @keyframes fly1{0%{transform:translate(-50px,140px);}100%{transform:translate(400px,64px);}}
  @keyframes fly2{0%{transform:translate(-80px,82px);}100%{transform:translate(400px,150px);}}
  @keyframes fly3{0%{transform:translate(-60px,205px);}100%{transform:translate(400px,118px);}}
  .wing{animation:flap .45s ease-in-out infinite; transform-origin:center; transform-box:fill-box;}
  @keyframes flap{0%,100%{transform:scaleY(1);}50%{transform:scaleY(.5);}}
  .sun-glow{transform-origin:center; transform-box:fill-box; animation:breathe 5s ease-in-out infinite;}
  @keyframes breathe{0%,100%{opacity:.32; transform:scale(1);}50%{opacity:.52; transform:scale(1.12);}}
  .climber{animation:bob 2.6s ease-in-out infinite;}
  @keyframes bob{0%,100%{transform:translateY(0);}50%{transform:translateY(-3px);}}
  .halo{transform-origin:center; transform-box:fill-box; animation:pulse 2.2s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:.5; transform:scale(1);}50%{opacity:.9; transform:scale(1.2);}}
  .node{cursor:pointer;}
  .node.shake{animation:shake .42s;}
  @keyframes shake{0%,100%{transform:translateX(0);}20%,60%{transform:translateX(-3px);}40%,80%{transform:translateX(3px);}}

  .mist{position:absolute; inset:-12% -10%; pointer-events:none; opacity:0; z-index:4;}
  .mist.up{animation:mistUp .62s ease-in;}
  .mist.down{animation:mistDown .62s ease-in;}
  @keyframes mistUp{0%{opacity:0; transform:translateY(70%);}45%{opacity:1;}100%{opacity:0; transform:translateY(-70%);}}
  @keyframes mistDown{0%{opacity:0; transform:translateY(-70%);}45%{opacity:1;}100%{opacity:0; transform:translateY(70%);}}

  .hud{position:absolute; top:0; left:0; right:0; z-index:6;
    display:flex; align-items:flex-start; justify-content:space-between; gap:8px; padding:16px 16px 0;}
  .hud-main{display:flex; flex-direction:column; gap:8px; align-items:flex-start;}
  .metrics{display:flex; gap:10px; align-items:center; padding-left:1px;
    color:#fff; text-shadow:0 1px 3px rgba(53,133,194,.45);}
  .metric{display:flex; align-items:center; gap:4px; font-size:11px; font-weight:700;}
  .metric svg{width:13px;height:13px;}
  .hud-actions{display:flex; align-items:center; gap:8px;}
  .spark{display:flex; align-items:center; gap:5px; padding:6px 10px; border-radius:999px;
    color:var(--yellow-deep); background:rgba(255,243,200,.86); backdrop-filter:blur(8px);
    -webkit-backdrop-filter:blur(8px); border:1px solid rgba(246,200,79,.4);
    box-shadow:0 5px 14px rgba(201,141,22,.18); font-size:13px; font-weight:800;}
  .spark svg{width:14px;height:14px;}
  .settings{width:31px;height:31px;border-radius:50%;border:1px solid rgba(215,234,249,.65);
    background:rgba(255,255,255,.76);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
    color:var(--blue-deep);display:flex;align-items:center;justify-content:center;
    box-shadow:0 5px 14px rgba(53,133,194,.16);cursor:pointer;}
  .settings svg{width:17px;height:17px;}
  .parts{display:flex; align-items:flex-end; gap:13px;}
  .part{background:none; border:none; padding:0; cursor:pointer; font-family:inherit; line-height:1;
    font-size:15px; color:#5F8E82; transition:.28s; text-shadow:0 1px 2px rgba(255,255,255,.5);}
  .part.active{font-size:26px; font-weight:800; color:#fff; text-shadow:0 1px 4px rgba(53,133,194,.55);}

  .hint{position:absolute; top:88px; left:0; right:0; z-index:6;
    display:flex; align-items:center; justify-content:center; color:#fff;
    text-shadow:0 2px 6px rgba(53,133,194,.45); pointer-events:none; animation:bob 2.6s ease-in-out infinite;}
  .hint svg{width:34px;height:34px;filter:drop-shadow(0 2px 5px rgba(53,133,194,.35));}

  .bottom{position:absolute; left:0; right:0; bottom:0; z-index:6; pointer-events:none;}
  .bottom > *{pointer-events:auto;}
  .review{margin:0 16px 12px; background:rgba(255,248,219,.86); backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px); border-radius:20px; padding:12px 15px; display:flex;
    align-items:center; gap:12px; box-shadow:0 10px 24px rgba(201,141,22,.18); cursor:pointer;
    transition:transform .15s; border:1px solid rgba(246,200,79,.42);}
  .review:active{transform:scale(.98);}
  .review .ic{width:40px; height:40px; border-radius:14px; flex:none; display:flex; align-items:center;
    justify-content:center; font-size:19px; background:linear-gradient(135deg,#FFE68A,var(--yellow)); color:#7A5200;}
  .review .t1{font-size:14px; font-weight:600; color:var(--yellow-deep);}
  .review .t2{font-size:12px; color:#8A6B13;}
  .review .arr{margin-left:auto; color:var(--yellow-deep); font-size:20px; line-height:1;}

  .toast{position:absolute; left:50%; bottom:120px; transform:translateX(-50%) translateY(10px);
    background:#2E4D44; color:#fff; font-size:12.5px; padding:9px 15px; border-radius:14px; opacity:0;
    pointer-events:none; transition:.3s; z-index:20; white-space:nowrap; box-shadow:0 8px 22px rgba(0,0,0,.18);}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

  .onboard{position:absolute; inset:0; z-index:30; background:rgba(40,77,68,.42);
    backdrop-filter:blur(3px); display:flex; align-items:center; justify-content:center; padding:24px;
    opacity:0; pointer-events:none; transition:.3s;}
  .onboard.show{opacity:1; pointer-events:auto;}
  .ob-card{background:#fff; border-radius:26px; padding:24px 22px; width:100%;
    box-shadow:0 20px 50px rgba(40,90,72,.3); transform:translateY(14px); transition:transform .3s;}
  .onboard.show .ob-card{transform:translateY(0);}
  .ob-card .em{font-size:34px;}
  .ob-card h2{margin:8px 0 4px; font-size:19px; font-weight:600; color:#2E4D44;}
  .ob-card p{margin:0 0 14px; font-size:13px; line-height:1.6; color:var(--muted);}
  .ob-card textarea{width:100%; min-height:84px; border:1px solid var(--line); border-radius:14px;
    padding:11px 13px; font-family:inherit; font-size:13.5px; line-height:1.5; color:#37524B; resize:none;
    background:#F7FBF9;}
  .ob-card textarea:focus{outline:none; border-color:var(--green);}
  .ob-go{margin-top:14px; width:100%; border:none; border-radius:15px; padding:14px; background:var(--green);
    color:#fff; font-family:inherit; font-size:15px; font-weight:600; cursor:pointer; box-shadow:0 10px 24px rgba(63,193,150,.4);}
  .ob-skip{margin-top:10px; width:100%; background:none; border:none; font-family:inherit; font-size:13px;
    color:var(--muted); cursor:pointer;}
</style>
</head>
<body>
<div class="phone">

  <div class="stage" id="stage">
    <div class="scene" id="scene"></div>
    <div class="mist" id="mist">
      <svg viewBox="0 0 340 240" preserveAspectRatio="none" width="100%" height="100%">
        <ellipse cx="60"  cy="80"  rx="80" ry="36" fill="#fff" opacity=".92"/>
        <ellipse cx="180" cy="56"  rx="95" ry="42" fill="#fff" opacity=".96"/>
        <ellipse cx="300" cy="92"  rx="85" ry="38" fill="#fff" opacity=".92"/>
        <ellipse cx="120" cy="140" rx="100" ry="44" fill="#fff" opacity=".88"/>
        <ellipse cx="250" cy="150" rx="90" ry="40" fill="#fff" opacity=".9"/>
      </svg>
    </div>
  </div>

  <div class="hud">
    <div class="hud-main">
      <div class="parts">
        <button class="part active" data-part="0">Part 1</button>
      </div>
      <div class="metrics">
        <div class="metric">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="4.5"/><circle cx="12" cy="12" r="1"/></svg>
          Target <span id="targetVal">6.5</span>
        </div>
        <div class="metric">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 20h18"/><path d="M6 20l6-15 6 15"/><path d="M9 13h6"/></svg>
          <span id="altVal">1,200</span>m
        </div>
      </div>
    </div>
    <div class="hud-actions">
      <div class="spark">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 2.2c2.6 2.9 2.2 5.2 4.1 7 2.2 2 4 4.2 4 7a7.9 7.9 0 0 1-15.8 0c0-3 1.5-5.4 3.7-7.3 1.5-1.3 2-3.7 4-6.7Z" fill="#E64B3C"/>
          <path d="M12.7 13.1c.8 1.2 2.4 2.2 2.4 4.2a3.2 3.2 0 0 1-6.4 0c0-1.7 1.1-2.8 2.2-4 .1 1 .7 1.5 1.3 1.5.5 0 .8-.5.5-1.7Z" fill="#FFB238"/>
        </svg>
        <span id="streakVal">7</span>
      </div>
      <a class="settings" href="profile.html" aria-label="设置">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><path d="M12 15.5A3.5 3.5 0 1 0 12 8a3.5 3.5 0 0 0 0 7.5Z"/><path d="M19.4 15a1.7 1.7 0 0 0 .34 1.88l.04.04a2 2 0 0 1-2.83 2.83l-.04-.04A1.7 1.7 0 0 0 15 19.4a1.7 1.7 0 0 0-1 .6V20a2 2 0 0 1-4 0v-.06a1.7 1.7 0 0 0-1-.54 1.7 1.7 0 0 0-1.88.34l-.04.04a2 2 0 0 1-2.83-2.83l.04-.04A1.7 1.7 0 0 0 4.6 15a1.7 1.7 0 0 0-.6-1H4a2 2 0 0 1 0-4h.06a1.7 1.7 0 0 0 .54-1 1.7 1.7 0 0 0-.34-1.88l-.04-.04a2 2 0 1 1 2.83-2.83l.04.04A1.7 1.7 0 0 0 9 4.6a1.7 1.7 0 0 0 1-.6V4a2 2 0 0 1 4 0v.06a1.7 1.7 0 0 0 1 .54 1.7 1.7 0 0 0 1.88-.34l.04-.04a2 2 0 1 1 2.83 2.83l-.04.04A1.7 1.7 0 0 0 19.4 9c.2.36.4.68.6 1H20a2 2 0 0 1 0 4h-.06a1.7 1.7 0 0 0-.54 1Z"/></svg>
      </a>
    </div>
  </div>

  <div class="hint" id="hint">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
  </div>

  <div class="bottom">
    <div class="review" id="reviewCard">
      <div class="ic">🎁</div>
      <div>
        <div class="t1">Daily review</div>
        <div class="t2">点亮 +20 经验 · 1 关</div>
      </div>
      <div class="arr">›</div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <div class="onboard" id="onboard">
    <div class="ob-card">
      <div class="em">👋</div>
      <h2>先告诉我你是谁</h2>
      <p>写一句你的身份和爱好，AI 会据此生成更像「你」的口语范本。之后随时能在「我的」里修改。</p>
      <textarea id="obPersona" placeholder="例：我是一名爱爬山和摄影的大三学生，养了只猫，周末喜欢逛独立咖啡馆。"></textarea>
      <button class="ob-go" id="obGo">开始攀登</button>
      <button class="ob-skip" id="obSkip">先跳过，稍后再填</button>
    </div>
  </div>

</div>

<script src="question-bank.js"></script>
<script>
const FOOT = {x:34, y:612};
const NODE_POS = [
  {x:132, y:552},
  {x:230, y:486},
  {x:116, y:412},
  {x:260, y:302}
];
const TOPIC_NODE_POS = [
  {x:278, y:606},
  {x:146, y:568},
  {x:254, y:526},
  {x:78, y:486},
  {x:206, y:432},
  {x:52, y:382},
  {x:114, y:286}
];
let PARTS = [];

let partIdx = 0, peakIdx = 0;

const PKEY = 'speaker_progress';
function loadProg(){ try{ return JSON.parse(localStorage.getItem(PKEY))||{}; }catch(e){ return {}; } }
let prog = loadProg();
function progKey(pi,ki){ return pi+'-'+ki; }
function getDone(pi,ki){ const s = prog[progKey(pi,ki)]; return s!==undefined ? s : PARTS[pi].peaks[ki].done; }
function setDone(pi,ki,v){ prog[progKey(pi,ki)] = v; localStorage.setItem(PKEY, JSON.stringify(prog)); }

const ALT = [1200, 2480, 3760];
const SKIES = [
  "linear-gradient(180deg,#8FD3EF 0%,#AEE0F2 24%,#D4EFEC 54%,#E9F7E4 76%,#F4EFDF 100%)",
  "linear-gradient(180deg,#7CC8EE 0%,#A2DAF1 24%,#CDEBEC 54%,#E6F5E6 78%,#F3F0E2 100%)",
  "linear-gradient(180deg,#6FBEEC 0%,#97D2F0 24%,#C7E7EC 54%,#E2F3E8 78%,#F1F0E5 100%)",
];
const ACCENTS = [
  {a:'#F0875A', d:'#C75A2C', s:'#FCE3D7'},
  {a:'#F0875A', d:'#C75A2C', s:'#FCE3D7'},
  {a:'#F0875A', d:'#C75A2C', s:'#FCE3D7'},
];
const phoneEl = document.querySelector('.phone');

function animateAlt(to){
  const el = document.getElementById('altVal'); if(!el) return;
  const from = parseInt((el.textContent||'0').replace(/,/g,'')) || 0;
  const t0 = performance.now(), dur = 600;
  (function step(now){
    const k = Math.min(1,(now-t0)/dur);
    el.textContent = Math.round(from + (to-from)*(1-Math.pow(1-k,3))).toLocaleString();
    if(k<1) requestAnimationFrame(step);
  })(performance.now());
}

function pathD(){
  const f=FOOT, n=NODE_POS;
  return `M${f.x} ${f.y} C76 606 78 554 ${n[0].x} ${n[0].y} `
       + `C190 510 294 558 ${n[1].x} ${n[1].y} `
       + `C172 448 50 484 ${n[2].x} ${n[2].y} `
       + `C174 354 260 382 ${n[3].x} ${n[3].y}`;
}

function isTopicSet(partName){
  return partName === 'Part 1' || partName === 'Part 2&3' || partName === 'Part 2串题';
}

function nodePositions(peak, partName){
  if(!isTopicSet(partName)) return NODE_POS;
  const count = Math.max(1, peak.cards.length);
  const source = partName === 'Part 2串题' ? NODE_POS : TOPIC_NODE_POS;
  if(count >= source.length) return source;
  return Array.from({length:count}, (_, index)=>{
    const routePoint = count <= 1 ? source.length - 1 : Math.round((index * (source.length - 1)) / (count - 1));
    return source[routePoint];
  });
}

function routePath(points){
  const all = [FOOT, ...points];
  return all.map((point,index)=>{
    if(index===0) return `M${point.x} ${point.y}`;
    const prev = all[index-1];
    const midY = (prev.y + point.y) / 2;
    const bend = index % 2 === 0 ? 36 : -36;
    return `C${prev.x + bend} ${midY} ${point.x - bend} ${midY} ${point.x} ${point.y}`;
  }).join(' ');
}

function nextPathD(){
  const p = NODE_POS[3];
  return `M${p.x} ${p.y} C300 286 306 248 346 226 C364 216 378 208 396 196`;
}

function entryPathD(){
  const f = FOOT;
  return `M-42 668 C-8 656 4 630 ${f.x} ${f.y}`;
}

function buildScene(peak, pdone, ki, total, partName){
  const topicSet = isTopicSet(partName);
  const positions = nodePositions(peak, partName);
  const mainPath = topicSet ? routePath(positions) : pathD();
  const nodes = positions.map((p,i)=>{
    const isBoss = !topicSet && i===3, done = i<pdone, current = i===pdone;
    const label = String(isBoss ? peak.boss : peak.topics[i] || 'Practice');
    let inner = "";
    if(done){
      inner = `<circle cx="${p.x}" cy="${p.y}" r="${isBoss?13:9}" fill="var(--green)"/>
               <circle cx="${p.x}" cy="${p.y}" r="${isBoss?13:9}" fill="none" stroke="#fff" stroke-width="2" opacity=".5"/>
               <path d="M${p.x-5} ${p.y} l4 4 l7 -8" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>`;
    } else if(current){
      const halo = `<ellipse class="halo" cx="${p.x}" cy="${p.y+12}" rx="25" ry="11" fill="var(--yellow-soft)" opacity=".9"/>`;
      if(isBoss){
        inner = halo + `<circle cx="${p.x}" cy="${p.y}" r="15" fill="#fff"/><circle cx="${p.x}" cy="${p.y}" r="11.2" fill="var(--yellow)"/>
          <text x="${p.x}" y="${p.y+4}" text-anchor="middle" font-size="13">😺</text>
          <rect x="${p.x}" y="${p.y-28}" width="3" height="15" fill="var(--yellow-deep)"/>
          <path d="M${p.x+3} ${p.y-28} l13 4.5 l-13 4.5 Z" fill="var(--yellow)"/>`;
      } else {
        inner = halo + `<circle cx="${p.x}" cy="${p.y}" r="14" fill="#fff"/><circle cx="${p.x}" cy="${p.y}" r="10.2" fill="var(--yellow)"/>
          <g class="climber"><g transform="translate(${p.x},${p.y-13})">
            <circle cx="0" cy="-3" r="3.6" fill="#fff"/>
            <path d="M-3.3 1 q3.3 -4 6.6 0 l-1 6.5 h-4.6 Z" fill="#fff"/>
            <path d="M-3.6 -5 a3.8 2.1 0 0 1 7.2 0 Z" fill="var(--yellow-deep)"/>
          </g></g>`;
      }
    } else {
      inner = `<circle cx="${p.x}" cy="${p.y}" r="${isBoss?9:7.5}" fill="#fff"/>
               <circle cx="${p.x}" cy="${p.y}" r="${isBoss?6:4.8}" fill="var(--node-lock)"/>
               ${isBoss?`<rect x="${p.x}" y="${p.y-22}" width="3" height="11" fill="#BBD8CB"/><path d="M${p.x+3} ${p.y-22} l9 3 l-9 3 Z" fill="#CDD9D1"/>`:""}`;
    }
    const w = Math.max(46, label.length*6.4 + 16);
    const ly = p.y - (isBoss?27:25);
    const lc = current ? "var(--yellow-deep)" : "var(--muted)";
    const lw = current ? "600" : "500";
    const lbl = `<rect x="${p.x-w/2}" y="${ly-12}" width="${w}" height="17" rx="8.5" fill="#fff" opacity="${current?1:.94}"/>
                 <text x="${p.x}" y="${ly}" text-anchor="middle" font-size="10.5" fill="${lc}" font-weight="${lw}">${label}</text>`;
    return `<g class="node" data-i="${i}" data-state="${done?'done':current?'current':'lock'}">${lbl}${inner}</g>`;
  }).join("");

  let dots = "";
  for(let d=0; d<total; d++){
    const cy = 126 + (total - 1 - d) * 14;
    dots += `<circle cx="18" cy="${cy}" r="${d===ki?4.5:3}" fill="${d===ki?'#fff':'rgba(255,255,255,.5)'}"/>`;
  }
  const entryTrail = ki > 0 ? `
    <path d="${entryPathD()}" fill="none" stroke="rgba(74,48,24,.16)" stroke-width="17" stroke-linecap="round"/>
    <path d="${entryPathD()}" fill="none" stroke="#A9773E" stroke-width="10" stroke-linecap="round" opacity=".5"/>
    <path d="${entryPathD()}" fill="none" stroke="#D8B071" stroke-width="2.4" stroke-linecap="round" stroke-dasharray="1.5 10" opacity=".56"/>` : "";
  const nextTrail = ki < total - 1 ? `
    <path d="${nextPathD()}" fill="none" stroke="rgba(74,48,24,.14)" stroke-width="17" stroke-linecap="round"/>
    <path d="${nextPathD()}" fill="none" stroke="#A9773E" stroke-width="10" stroke-linecap="round" opacity=".46"/>
    <path d="${nextPathD()}" fill="none" stroke="#D8B071" stroke-width="2.4" stroke-linecap="round" stroke-dasharray="1.5 10" opacity=".5"/>` : "";

  return `
  <svg class="map" viewBox="0 0 340 720" preserveAspectRatio="xMidYMid slice">
    <defs>
      <linearGradient id="mtMain" x1="0" y1="0" x2="0" y2="1">

const scene = document.getElementById('scene');
const toast = document.getElementById('toast');
let toastTimer;
function showToast(msg){
  toast.textContent = msg; toast.classList.add('show');
  clearTimeout(toastTimer); toastTimer = setTimeout(()=>toast.classList.remove('show'), 1600);
}

function applyAccent(){
  const acc = ACCENTS[Math.min(peakIdx, ACCENTS.length-1)];
  phoneEl.style.setProperty('--acc', acc.a);
  phoneEl.style.setProperty('--acc-deep', acc.d);
  phoneEl.style.setProperty('--acc-soft', acc.s);
}

function render(){
  if(!PARTS.length) return;
  const peak = PARTS[partIdx].peaks[peakIdx];
  const total = PARTS[partIdx].peaks.length;
  applyAccent();
  scene.innerHTML = buildScene(peak, getDone(partIdx, peakIdx), peakIdx, total, PARTS[partIdx].name);
  document.getElementById('hint').style.display = peakIdx < total-1 ? 'flex' : 'none';
  phoneEl.style.background = SKIES[Math.min(peakIdx, SKIES.length-1)];
  animateAlt(ALT[Math.min(peakIdx, ALT.length-1)]);
  bindNodes();
}

function bindNodes(){
  scene.querySelectorAll('.node').forEach(n=>{
    n.addEventListener('click', ()=>{
      const st = n.dataset.state, i = +n.dataset.i;
      const peak = PARTS[partIdx].peaks[peakIdx];
      const partName = PARTS[partIdx].name;
      const partNo = QuestionBank.partQuestionNo(partName);
      const topicSet = isTopicSet(partName);
      const card = topicSet ? peak.cards[i] : (i===3 ? peak.cards[0] : peak.cards[i]);
      const question = card?.questions?.find(q => q.part === partNo) || card?.questions?.[0];
      const label = !topicSet && i===3 ? peak.boss : peak.topics[i];
      const go = ()=>{
        const qs = `?p=${partIdx}&pk=${peakIdx}&n=${i}`
          + `&part=${encodeURIComponent(partName)}`
          + `&peak=${encodeURIComponent(peak.name)}`
          + `&topic=${encodeURIComponent(label)}`
          + (card ? `&topicId=${encodeURIComponent(card.id)}` : '')
          + (question ? `&questionId=${encodeURIComponent(question.id)}` : '');
        location.href = (!topicSet && i===3 ? 'examiner.html' : 'card-practice.html') + qs;
      };
      if(st==='lock'){
        n.classList.add('shake'); setTimeout(()=>n.classList.remove('shake'),450);
        showToast(i===3 ? '🔒 先清完本峰 3 关再战 Boss' : '🔒 先过前面的关卡');
      } else { go(); }
    });
  });
}

function renderPartTabs(){
  const tabs = document.querySelector('.parts');
  tabs.innerHTML = PARTS.map((part, index)=>
    `<button class="part ${index === partIdx ? 'active' : ''}" data-part="${index}">${part.name}</button>`
  ).join('');
  tabs.querySelectorAll('.part').forEach(b=>{
    b.addEventListener('click', ()=>{
      partIdx = +b.dataset.part;
      peakIdx = 0;
      renderPartTabs();
      render();
    });
  });
}

function switchPart(dir){
  const next = partIdx + dir;
  if(next < 0 || next >= PARTS.length){ showToast(dir>0 ? '已经是最后一个 Part' : '已经是第一个 Part'); return; }
  partIdx = next;
  peakIdx = 0;
  renderPartTabs();
  render();
}

function switchPeak(dir){
  const peaks = PARTS[partIdx].peaks, next = peakIdx + dir;
  if(next < 0 || next >= peaks.length){ showToast(dir>0 ? '已是最高峰 ⛰' : '已在山脚'); return; }
  const mist = document.getElementById('mist');
  mist.classList.remove('up','down'); void mist.offsetWidth; mist.classList.add(dir>0?'down':'up');
  scene.classList.add(dir>0?'enter-down':'exit-up');
  setTimeout(()=>{
    peakIdx = next; render();
    scene.classList.add(dir>0?'exit-up':'enter-down');
    requestAnimationFrame(()=>requestAnimationFrame(()=>scene.classList.remove('exit-up','enter-down')));
  }, 300);
}

let startX = null, startY = null;
const stage = document.getElementById('stage');
stage.addEventListener('touchstart', e=>{ startX = e.touches[0].clientX; startY = e.touches[0].clientY; }, {passive:true});
stage.addEventListener('touchend', e=>{
  if(startY===null) return;
  const dx = e.changedTouches[0].clientX - startX;
  const dy = e.changedTouches[0].clientY - startY;
  if(Math.abs(dx) > 55 && Math.abs(dx) > Math.abs(dy)) switchPart(dx<0 ? +1 : -1);
  else if(Math.abs(dy) > 55) switchPeak(dy>0 ? +1 : -1);
  startX = null; startY = null;
});
let wheelLock=false;
stage.addEventListener('wheel', e=>{
  e.preventDefault();
  if(wheelLock || Math.abs(e.deltaY) < 12) return;
  wheelLock=true; switchPeak(e.deltaY<0 ? +1 : -1); setTimeout(()=>wheelLock=false, 650);
}, {passive:false});

document.getElementById('reviewCard').addEventListener('click', ()=>showToast('🎁 今日复习补给 · +20 经验'));

document.getElementById('targetVal').textContent = localStorage.getItem('speaker_target') || '6.5';

function handleReturn(){
  const u = new URLSearchParams(location.search);
  if(u.has('p')) partIdx = Math.min(+u.get('p'), PARTS.length-1);
  if(u.has('pk')) peakIdx = Math.min(+u.get('pk'), PARTS[partIdx].peaks.length-1);
  renderPartTabs();
  if(u.get('done')==='1'){
    const n = +u.get('n'), cur = getDone(partIdx, peakIdx);
    if(n === cur) setDone(partIdx, peakIdx, cur+1);
    render();
    const topic = u.get('topic') ? decodeURIComponent(u.get('topic')) : '关卡';
    setTimeout(()=>showToast(`🎉 ${topic} 点亮成功！+20 经验`), 350);
    history.replaceState({}, '', location.pathname); return;
  }
  render();
  history.replaceState({}, '', location.pathname);
}

(function onboarding(){
  if(localStorage.getItem('speaker_onboarded')) return;
  const ob = document.getElementById('onboard');
  const ta = document.getElementById('obPersona');
  ta.value = localStorage.getItem('speaker_persona') || '';
  setTimeout(()=>ob.classList.add('show'), 400);
  function finish(){
    const v = ta.value.trim();
    if(v) localStorage.setItem('speaker_persona', v);
    localStorage.setItem('speaker_onboarded', '1');
    ob.classList.remove('show');
  }
  document.getElementById('obGo').addEventListener('click', finish);
  document.getElementById('obSkip').addEventListener('click', finish);
})();

(async function initQuestionBank(){
  try{
    const bank = await QuestionBank.load();
    PARTS = bank.parts;
    if(!bank.loaded) showToast('题库读取失败，已使用内置备用题');
  }catch(e){
    console.warn(e);
  }
  handleReturn();
})();
</script>
