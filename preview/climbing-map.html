<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Speaking · 登山地图</title>
<style>
  :root{
    --green:#3FC196; --green-deep:#2E9C97; --green-text:#1E7A66;
    --coral:#FF8C5A; --coral-deep:#E26A36; --coral-text:#E26A36;
    --halo:#FFC9A6;
    --teal:#3FB6C2; --teal-deep:#2E8C97;
    --ink:#3F5C50; --muted:#7C9A8D; --faint:#A6C0B7;
    --node-lock:#BBD8CB; --line:#E4EFE9;
    --glass:rgba(255,255,255,.72);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; height:100%;}
  body{background:#CFE3DB; font-family:Inter,"PingFang SC","Microsoft YaHei",Arial,sans-serif;
       color:var(--ink); display:grid; place-items:center; min-height:100vh; padding:18px;}

  .phone{width:340px; height:720px; position:relative; overflow:hidden; border-radius:38px;
    border:2px solid #fff; box-shadow:0 0 0 1px #DCE9E2, 0 30px 70px rgba(40,90,72,.22);
    background:linear-gradient(180deg,#8FD3EF 0%,#AEE0F2 24%,#D4EFEC 54%,#E9F7E4 76%,#F4EFDF 100%);
    transition:background .7s ease;}

  /* ---- full-screen scene ---- */
  .stage{position:absolute; inset:0; z-index:1;}
  .scene{position:absolute; inset:0; transition:transform .55s cubic-bezier(.4,.05,.2,1), opacity .4s;}
  .scene.exit-up{transform:translateY(-20px) scale(1.06); opacity:0;}
  .scene.enter-down{transform:translateY(22px) scale(1.06); opacity:0;}
  svg.map{width:100%; height:100%; display:block;}

  /* ambient motion */
  .cloud{animation:drift 16s ease-in-out infinite;}
  .cloud.c2{animation-duration:23s; animation-delay:-6s;}
  @keyframes drift{0%,100%{transform:translateX(0);}50%{transform:translateX(20px);}}
  .bird1{animation:fly1 17s linear infinite;}
  .bird2{animation:fly2 23s linear infinite; animation-delay:-7s;}
  .bird3{animation:fly3 20s linear infinite; animation-delay:-13s;}
  @keyframes fly1{0%{transform:translate(-50px,140px);}100%{transform:translate(400px,64px);}}
  @keyframes fly2{0%{transform:translate(-80px,82px);}100%{transform:translate(400px,150px);}}
  @keyframes fly3{0%{transform:translate(-60px,205px);}100%{transform:translate(400px,118px);}}
  .wing{animation:flap .45s ease-in-out infinite; transform-origin:center; transform-box:fill-box;}
  @keyframes flap{0%,100%{transform:scaleY(1);}50%{transform:scaleY(.5);}}
  .sun-glow{transform-origin:center; transform-box:fill-box; animation:breathe 5s ease-in-out infinite;}
  @keyframes breathe{0%,100%{opacity:.32; transform:scale(1);}50%{opacity:.52; transform:scale(1.12);}}
  .climber{animation:bob 2.6s ease-in-out infinite;}
  @keyframes bob{0%,100%{transform:translateY(0);}50%{transform:translateY(-3px);}}
  .halo{transform-origin:center; transform-box:fill-box; animation:pulse 2.2s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:.5; transform:scale(1);}50%{opacity:.9; transform:scale(1.2);}}
  .node{cursor:pointer;}
  .node.shake{animation:shake .42s;}
  @keyframes shake{0%,100%{transform:translateX(0);}20%,60%{transform:translateX(-3px);}40%,80%{transform:translateX(3px);}}

  /* mist sweep on peak change */
  .mist{position:absolute; inset:-12% -10%; pointer-events:none; opacity:0; z-index:4;}
  .mist.up{animation:mistUp .62s ease-in;}
  .mist.down{animation:mistDown .62s ease-in;}
  @keyframes mistUp{0%{opacity:0; transform:translateY(70%);}45%{opacity:1;}100%{opacity:0; transform:translateY(-70%);}}
  @keyframes mistDown{0%{opacity:0; transform:translateY(-70%);}45%{opacity:1;}100%{opacity:0; transform:translateY(70%);}}

  /* ---- floating UI ---- */
  .hud{position:absolute; top:0; left:0; right:0; z-index:6;
    display:flex; align-items:center; justify-content:space-between; gap:8px; padding:16px 16px 0;}
  .chip{display:flex; align-items:center; gap:5px; background:var(--glass); backdrop-filter:blur(8px);
    -webkit-backdrop-filter:blur(8px); padding:6px 11px; border-radius:20px; font-size:13px; font-weight:600;
    box-shadow:0 4px 12px rgba(40,90,72,.12);}
  .chip.streak{color:var(--coral-deep);}
  .chip.target{color:var(--teal-deep);}
  .chip svg{width:14px;height:14px;}
  .parts{display:flex; align-items:flex-end; gap:11px;}
  .part{background:none; border:none; padding:0; cursor:pointer; font-family:inherit; line-height:1;
    font-size:13px; color:#6E9486; transition:.28s; text-shadow:0 1px 2px rgba(255,255,255,.5);}
  .part.active{font-size:21px; font-weight:700; color:#fff; text-shadow:0 1px 4px rgba(60,120,150,.5);}

  .hint{position:absolute; top:92px; left:50%; transform:translateX(-50%); z-index:6;
    display:flex; flex-direction:column; align-items:center; gap:1px; color:#fff; font-size:10px;
    text-shadow:0 1px 3px rgba(60,120,150,.5); pointer-events:none; animation:bob 2.6s ease-in-out infinite;}
  .hint svg{width:16px;height:16px;}

  .bottom{position:absolute; left:0; right:0; bottom:0; z-index:6; pointer-events:none;}
  .bottom > *{pointer-events:auto;}
  .review{margin:0 16px 12px; background:var(--glass); backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px); border-radius:20px; padding:12px 15px; display:flex;
    align-items:center; gap:12px; box-shadow:0 8px 22px rgba(40,90,72,.16); cursor:pointer;
    transition:transform .15s; border:1px solid rgba(255,255,255,.6);}
  .review:active{transform:scale(.98);}
  .review .ic{width:40px; height:40px; border-radius:14px; flex:none; display:flex; align-items:center;
    justify-content:center; font-size:19px; background:linear-gradient(135deg,#5FCBD6,#3FB6C2);}
  .review .t1{font-size:14px; font-weight:600; color:var(--teal-deep);}
  .review .t2{font-size:12px; color:#5E8E86;}
  .review .arr{margin-left:auto; color:var(--teal); font-size:20px; line-height:1;}

  .nav{display:flex; justify-content:space-around; padding:8px 14px 18px;
    background:linear-gradient(180deg,rgba(255,255,255,0),rgba(255,255,255,.55) 45%);}
  .nav a{display:flex; flex-direction:column; align-items:center; gap:3px; color:#7FA294;
    text-decoration:none; font-size:10px; cursor:pointer; text-shadow:0 1px 2px rgba(255,255,255,.5);}
  .nav a.on{color:var(--green-deep); font-weight:600;}
  .nav svg{width:23px;height:23px;}

  .toast{position:absolute; left:50%; bottom:120px; transform:translateX(-50%) translateY(10px);
    background:#2E4D44; color:#fff; font-size:12.5px; padding:9px 15px; border-radius:14px; opacity:0;
    pointer-events:none; transition:.3s; z-index:20; white-space:nowrap; box-shadow:0 8px 22px rgba(0,0,0,.18);}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="phone">

  <div class="stage" id="stage">
    <div class="scene" id="scene"></div>
    <div class="mist" id="mist">
      <svg viewBox="0 0 340 240" preserveAspectRatio="none" width="100%" height="100%">
        <ellipse cx="60"  cy="80"  rx="80" ry="36" fill="#fff" opacity=".92"/>
        <ellipse cx="180" cy="56"  rx="95" ry="42" fill="#fff" opacity=".96"/>
        <ellipse cx="300" cy="92"  rx="85" ry="38" fill="#fff" opacity=".92"/>
        <ellipse cx="120" cy="140" rx="100" ry="44" fill="#fff" opacity=".88"/>
        <ellipse cx="250" cy="150" rx="90" ry="40" fill="#fff" opacity=".9"/>
      </svg>
    </div>
  </div>

  <div class="hud">
    <div class="chip streak">
      <svg viewBox="0 0 24 24" fill="#FF8C5A" stroke="none"><path d="M12 2c1 3-1 4-1 6 0 1 1 2 2 2s2-1 2-3c2 2 3 4 3 7a8 8 0 1 1-13-5c2 2 3 1 3-1 0-3 1-5 1-6z"/></svg>
      <span id="streakVal">7</span>
    </div>
    <div class="parts">
      <button class="part" data-part="0">Part 1</button>
      <button class="part active" data-part="1">Part 2</button>
      <button class="part" data-part="2">Part 3</button>
    </div>
    <div class="chip target">
      <svg viewBox="0 0 24 24" fill="none" stroke="#2E8C97" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="4.5"/><circle cx="12" cy="12" r="1"/></svg>
      <span id="targetVal">6.5</span>
    </div>
  </div>

  <div class="hint" id="hint">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M18 15l-6-6-6 6"/></svg>
    <span>上滑去下一峰</span>
  </div>

  <div class="bottom">
    <div class="review" id="reviewCard">
      <div class="ic">🎁</div>
      <div>
        <div class="t1">Daily review</div>
        <div class="t2">点亮 +20 经验 · 1 关</div>
      </div>
      <div class="arr">›</div>
    </div>
    <div class="nav">
      <a class="on"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21l6-12 5 7 3-4 4 9z"/></svg><span>登山</span></a>
      <a href="card-practice.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="6" width="13" height="14" rx="2"/><path d="M16 8l4 1.5v9L16 20"/></svg><span>练习</span></a>
      <a href="profile.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M5 20a7 7 0 0 1 14 0"/></svg><span>我的</span></a>
    </div>
  </div>

  <div class="toast" id="toast"></div>

</div>

<script>
// ---------- data ----------
const FOOT = {x:52, y:576};
const NODE_POS = [
  {x:104, y:496},   // topic 1
  {x:170, y:404},   // topic 2
  {x:228, y:312},   // topic 3
  {x:258, y:186}    // boss
];
const PARTS = [
  { name:"Part 1", peaks:[
    {name:"Hometown", topics:["Where you live","Your room","Neighbours"], boss:"Examiner", done:2},
    {name:"Food",     topics:["Cooking","Eating out","Snacks"],          boss:"Examiner", done:0},
    {name:"Music",    topics:["Favourite song","Concerts","Singing"],     boss:"Examiner", done:0},
  ]},
  { name:"Part 2", peaks:[
    {name:"Hometown", topics:["Daily routine","Weekend","Neighbours"], boss:"Examiner", done:1},
    {name:"Travel",   topics:["A trip","A city","A journey"],          boss:"Examiner", done:0},
    {name:"Study",    topics:["A teacher","A subject","A skill"],       boss:"Examiner", done:0},
  ]},
  { name:"Part 3", peaks:[
    {name:"Society",     topics:["Technology","Work life","Change"], boss:"Examiner", done:0},
    {name:"Environment", topics:["Climate","Cities","Future"],       boss:"Examiner", done:0},
    {name:"Opinions",    topics:["Education","Media","Values"],       boss:"Examiner", done:0},
  ]},
];

let partIdx = 1, peakIdx = 0;

// ---------- progress (persisted) ----------
const PKEY = 'speaker_progress';
function loadProg(){ try{ return JSON.parse(localStorage.getItem(PKEY))||{}; }catch(e){ return {}; } }
let prog = loadProg();
function progKey(pi,ki){ return pi+'-'+ki; }
function getDone(pi,ki){ const s = prog[progKey(pi,ki)]; return s!==undefined ? s : PARTS[pi].peaks[ki].done; }
function setDone(pi,ki,v){ prog[progKey(pi,ki)] = v; localStorage.setItem(PKEY, JSON.stringify(prog)); }

const ALT = [1200, 2480, 3760];
const SKIES = [
  "linear-gradient(180deg,#8FD3EF 0%,#AEE0F2 24%,#D4EFEC 54%,#E9F7E4 76%,#F4EFDF 100%)",
  "linear-gradient(180deg,#7CC8EE 0%,#A2DAF1 24%,#CDEBEC 54%,#E6F5E6 78%,#F3F0E2 100%)",
  "linear-gradient(180deg,#6FBEEC 0%,#97D2F0 24%,#C7E7EC 54%,#E2F3E8 78%,#F1F0E5 100%)",
];
const phoneEl = document.querySelector('.phone');

function animateAlt(to){
  const el = document.getElementById('altVal'); if(!el) return;
  const from = parseInt((el.textContent||'0').replace(/,/g,'')) || 0;
  const t0 = performance.now(), dur = 600;
  (function step(now){
    const k = Math.min(1,(now-t0)/dur);
    el.textContent = Math.round(from + (to-from)*(1-Math.pow(1-k,3))).toLocaleString();
    if(k<1) requestAnimationFrame(step);
  })(performance.now());
}

// ---------- scene ----------
function pathD(){
  const f=FOOT, n=NODE_POS;
  return `M${f.x} ${f.y} Q92 540 ${n[0].x} ${n[0].y} Q120 430 ${n[1].x} ${n[1].y} `
       + `Q224 376 ${n[2].x} ${n[2].y} Q236 250 ${n[3].x} ${n[3].y}`;
}

function buildScene(peak, pdone, ki, total){
  const nodes = NODE_POS.map((p,i)=>{
    const isBoss = i===3, done = i<pdone, current = i===pdone;
    const label = isBoss ? peak.boss : peak.topics[i];
    let inner = "";
    if(done){
      inner = `<circle cx="${p.x}" cy="${p.y}" r="${isBoss?13:9}" fill="var(--green)"/>
               <circle cx="${p.x}" cy="${p.y}" r="${isBoss?13:9}" fill="none" stroke="#fff" stroke-width="2" opacity=".5"/>
               <path d="M${p.x-5} ${p.y} l4 4 l7 -8" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>`;
    } else if(current){
      const halo = `<ellipse class="halo" cx="${p.x}" cy="${p.y+12}" rx="21" ry="9" fill="var(--halo)" opacity=".7"/>`;
      if(isBoss){
        inner = halo + `<circle cx="${p.x}" cy="${p.y}" r="14" fill="#fff"/><circle cx="${p.x}" cy="${p.y}" r="10.5" fill="var(--coral)"/>
          <text x="${p.x}" y="${p.y+4}" text-anchor="middle" font-size="13">😺</text>
          <rect x="${p.x}" y="${p.y-26}" width="3" height="13" fill="var(--coral-deep)"/>
          <path d="M${p.x+3} ${p.y-26} l11 4 l-11 4 Z" fill="var(--coral)"/>`;
      } else {
        inner = halo + `<circle cx="${p.x}" cy="${p.y}" r="13" fill="#fff"/><circle cx="${p.x}" cy="${p.y}" r="9.5" fill="var(--coral)"/>
          <g class="climber"><g transform="translate(${p.x},${p.y-13})">
            <circle cx="0" cy="-3" r="3.6" fill="#fff"/>
            <path d="M-3.3 1 q3.3 -4 6.6 0 l-1 6.5 h-4.6 Z" fill="#fff"/>
            <path d="M-3.6 -5 a3.8 2.1 0 0 1 7.2 0 Z" fill="var(--coral-deep)"/>
          </g></g>`;
      }
    } else {
      inner = `<circle cx="${p.x}" cy="${p.y}" r="${isBoss?9:7.5}" fill="#fff"/>
               <circle cx="${p.x}" cy="${p.y}" r="${isBoss?6:4.8}" fill="var(--node-lock)"/>
               ${isBoss?`<rect x="${p.x}" y="${p.y-22}" width="3" height="11" fill="#BBD8CB"/><path d="M${p.x+3} ${p.y-22} l9 3 l-9 3 Z" fill="#CDD9D1"/>`:""}`;
    }
    const w = Math.max(46, label.length*6.4 + 16);
    const ly = p.y - (isBoss?27:25);
    const lc = current ? "var(--coral-text)" : "var(--muted)";
    const lw = current ? "600" : "500";
    const lbl = `<rect x="${p.x-w/2}" y="${ly-12}" width="${w}" height="17" rx="8.5" fill="#fff" opacity="${current?1:.94}"/>
                 <text x="${p.x}" y="${ly}" text-anchor="middle" font-size="10.5" fill="${lc}" font-weight="${lw}">${label}</text>`;
    return `<g class="node" data-i="${i}" data-state="${done?'done':current?'current':'lock'}">${lbl}${inner}</g>`;
  }).join("");

  // peak indicator dots (which peak of the part)
  let dots = "";
  for(let d=0; d<total; d++){
    const cy = 150 + d*15;
    dots += `<circle cx="324" cy="${cy}" r="${d===ki?4.5:3}" fill="${d===ki?'#fff':'rgba(255,255,255,.5)'}"/>`;
  }

  return `
  <svg class="map" viewBox="0 0 340 720" preserveAspectRatio="xMidYMid slice">
    <defs>
      <linearGradient id="mtMain" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#7FD0AE"/><stop offset="1" stop-color="#4FBD93"/>
      </linearGradient>
      <linearGradient id="mtFore" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#5FC79C"/><stop offset="1" stop-color="#43B083"/>
      </linearGradient>
    </defs>

    <circle class="sun-glow" cx="282" cy="70" r="36" fill="#FFE08A"/>
    <circle cx="282" cy="70" r="22" fill="#FFD45F"/>
    <circle cx="282" cy="70" r="22" fill="#FFEDB4" opacity=".45"/>

    <g class="cloud"><ellipse cx="74" cy="118" rx="34" ry="15" fill="#fff"/><ellipse cx="96" cy="108" rx="22" ry="14" fill="#fff"/><ellipse cx="52" cy="112" rx="18" ry="11" fill="#fff"/></g>
    <g class="cloud c2"><ellipse cx="250" cy="176" rx="26" ry="12" fill="#fff" opacity=".92"/><ellipse cx="267" cy="168" rx="17" ry="10" fill="#fff" opacity=".92"/></g>

    <g class="bird1"><g class="wing"><path d="M0 0 Q5 -5 10 0 Q15 -5 20 0" fill="none" stroke="#6E8E9E" stroke-width="2" stroke-linecap="round"/></g></g>
    <g class="bird2"><g class="wing"><path d="M0 0 Q4 -4 8 0 Q12 -4 16 0" fill="none" stroke="#7C99A6" stroke-width="1.8" stroke-linecap="round"/></g></g>
    <g class="bird3"><g class="wing"><path d="M0 0 Q4.5 -4.5 9 0 Q13.5 -4.5 18 0" fill="none" stroke="#88A2AE" stroke-width="1.8" stroke-linecap="round"/></g></g>

    <path d="M-10 720 L-10 360 Q70 300 150 350 Q220 398 290 332 Q330 296 360 326 L360 720 Z" fill="#BFE0D6"/>
    <path d="M-10 720 L20 470 Q120 386 180 430 Q226 350 258 186 Q300 410 360 470 L360 720 Z" fill="url(#mtMain)"/>
    <path d="M244 214 Q258 184 272 214 Q264 222 258 218 Q252 222 244 214 Z" fill="#fff" opacity=".94"/>
    <path d="M-10 720 L-10 596 Q90 540 180 598 Q272 656 360 596 L360 720 Z" fill="url(#mtFore)"/>
    <path d="M84 560 q6 16 -3 27 q-10 -9 3 -27Z" fill="#3FA37D" opacity=".45"/>
    <path d="M300 566 q6 16 -3 27 q-10 -9 3 -27Z" fill="#3FA37D" opacity=".4"/>

    <g><path d="M40 596 l8 -18 l8 18 Z" fill="#3C8F6E"/><path d="M40 587 l8 -16 l8 16 Z" fill="#4CA37E"/><rect x="46" y="596" width="4" height="7" fill="#9B7B53"/></g>
    <g><path d="M286 588 l7 -15 l7 15 Z" fill="#3C8F6E"/><path d="M286 581 l7 -13 l7 13 Z" fill="#4CA37E"/><rect x="290" y="588" width="4" height="7" fill="#9B7B53"/></g>
    <circle cx="150" cy="640" r="3" fill="#FF8C5A" opacity=".8"/><circle cx="210" cy="628" r="3" fill="#FFD45F" opacity=".85"/><circle cx="120" cy="620" r="2.5" fill="#fff" opacity=".8"/>

    <path d="${pathD()}" fill="none" stroke="#E7C893" stroke-width="12" stroke-linecap="round"/>
    <path d="${pathD()}" fill="none" stroke="#FCF4E2" stroke-width="3" stroke-linecap="round" stroke-dasharray="1.5 11"/>

    <g><circle cx="${FOOT.x}" cy="${FOOT.y}" r="10" fill="var(--green)"/><path d="M${FOOT.x-5} ${FOOT.y} l4 4 l7 -8" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></g>
    ${nodes}

    <text x="170" y="126" text-anchor="middle" font-size="15" font-weight="700" fill="#fff" style="paint-order:stroke" stroke="rgba(70,130,160,.35)" stroke-width="3">${peak.name}</text>
    <g transform="translate(296,150)">
      <path d="M0 0 l5 -9 l3 5 l3 -4 l5 8 Z" fill="#fff" opacity=".9"/>
      <text x="4" y="20" text-anchor="middle" font-size="10" font-weight="600" fill="#fff" style="paint-order:stroke" stroke="rgba(70,130,160,.35)" stroke-width="2.5"><tspan id="altVal">1,200</tspan> m</text>
    </g>
    ${dots}
  </svg>`;
}

const scene = document.getElementById('scene');
const toast = document.getElementById('toast');
let toastTimer;
function showToast(msg){
  toast.textContent = msg; toast.classList.add('show');
  clearTimeout(toastTimer); toastTimer = setTimeout(()=>toast.classList.remove('show'), 1600);
}

function render(){
  const peak = PARTS[partIdx].peaks[peakIdx];
  const total = PARTS[partIdx].peaks.length;
  scene.innerHTML = buildScene(peak, getDone(partIdx, peakIdx), peakIdx, total);
  document.getElementById('hint').style.display = peakIdx < total-1 ? 'flex' : 'none';
  phoneEl.style.background = SKIES[Math.min(peakIdx, SKIES.length-1)];
  animateAlt(ALT[Math.min(peakIdx, ALT.length-1)]);
  bindNodes();
}

function bindNodes(){
  scene.querySelectorAll('.node').forEach(n=>{
    n.addEventListener('click', ()=>{
      const st = n.dataset.state, i = +n.dataset.i;
      const peak = PARTS[partIdx].peaks[peakIdx];
      const label = i===3 ? peak.boss : peak.topics[i];
      const go = ()=>{
        const qs = `?p=${partIdx}&pk=${peakIdx}&n=${i}`
          + `&part=${encodeURIComponent(PARTS[partIdx].name)}`
          + `&peak=${encodeURIComponent(peak.name)}`
          + `&topic=${encodeURIComponent(label)}`;
        location.href = (i===3 ? 'examiner.html' : 'card-practice.html') + qs;
      };
      if(st==='lock'){
        n.classList.add('shake'); setTimeout(()=>n.classList.remove('shake'),450);
        showToast(i===3 ? '🔒 先清完本峰 3 关再战 Boss' : '🔒 先过前面的关卡');
      } else { go(); }
    });
  });
}

// part switch
document.querySelectorAll('.part').forEach(b=>{
  b.addEventListener('click', ()=>{
    document.querySelectorAll('.part').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    partIdx = +b.dataset.part; peakIdx = 0; render();
  });
});

// peak switch (swipe / wheel)
function switchPeak(dir){
  const peaks = PARTS[partIdx].peaks, next = peakIdx + dir;
  if(next < 0 || next >= peaks.length){ showToast(dir>0 ? '已是最高峰 ⛰' : '已在山脚'); return; }
  const mist = document.getElementById('mist');
  mist.classList.remove('up','down'); void mist.offsetWidth; mist.classList.add(dir>0?'up':'down');
  scene.classList.add(dir>0?'exit-up':'enter-down');
  setTimeout(()=>{
    peakIdx = next; render();
    scene.classList.add(dir>0?'enter-down':'exit-up');
    requestAnimationFrame(()=>requestAnimationFrame(()=>scene.classList.remove('exit-up','enter-down')));
  }, 300);
}

let startY = null;
const stage = document.getElementById('stage');
stage.addEventListener('touchstart', e=>{ startY = e.touches[0].clientY; }, {passive:true});
stage.addEventListener('touchend', e=>{
  if(startY===null) return;
  const dy = e.changedTouches[0].clientY - startY;
  if(Math.abs(dy) > 55) switchPeak(dy<0 ? +1 : -1);
  startY = null;
});
let wheelLock=false;
stage.addEventListener('wheel', e=>{
  e.preventDefault();
  if(wheelLock || Math.abs(e.deltaY) < 12) return;
  wheelLock=true; switchPeak(e.deltaY<0 ? +1 : -1); setTimeout(()=>wheelLock=false, 650);
}, {passive:false});

document.getElementById('reviewCard').addEventListener('click', ()=>showToast('🎁 今日复习补给 · +20 经验'));

// target band (set on profile page)
document.getElementById('targetVal').textContent = localStorage.getItem('speaker_target') || '6.5';

// return from practice: light up the node
(function handleReturn(){
  const u = new URLSearchParams(location.search);
  if(u.has('p')) partIdx = Math.min(+u.get('p'), PARTS.length-1);
  if(u.has('pk')) peakIdx = Math.min(+u.get('pk'), PARTS[partIdx].peaks.length-1);
  document.querySelectorAll('.part').forEach(x=>x.classList.toggle('active', +x.dataset.part===partIdx));
  if(u.get('done')==='1'){
    const n = +u.get('n'), cur = getDone(partIdx, peakIdx);
    if(n === cur) setDone(partIdx, peakIdx, cur+1);
    render();
    const topic = u.get('topic') ? decodeURIComponent(u.get('topic')) : '关卡';
    setTimeout(()=>showToast(`🎉 ${topic} 点亮成功！+20 经验`), 350);
    history.replaceState({}, '', location.pathname); return;
  }
  render();
  history.replaceState({}, '', location.pathname);
})();
</script>
