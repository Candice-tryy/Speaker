<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Speaking Sun Loader Preview</title>
<style>
  :root{
    --green-deep:#2E9C97;
    --yellow:#F6C84F;
    --blue-soft:#D7EAF9;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{
    min-height:100vh;
    display:grid;
    place-items:center;
    padding:18px;
    background:#2f2f2f;
    font-family:Inter,"PingFang SC","Microsoft YaHei",Arial,sans-serif;
  }
  .phone{
    width:390px;
    height:844px;
    position:relative;
    overflow:hidden;
    border-radius:42px;
    border:2px solid rgba(255,255,255,.92);
    box-shadow:0 0 0 1px rgba(220,233,226,.5),0 30px 70px rgba(0,0,0,.38);
    background:linear-gradient(180deg,#EAF7F0 0%,#DFF2EA 45%,#D3EEE1 100%);
  }
  .cloud-layer{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    pointer-events:none;
  }
  .cloud{
    animation:drift 16s ease-in-out infinite;
    transform-origin:center;
    transform-box:fill-box;
  }
  .cloud.c2{
    animation-duration:23s;
    animation-delay:-6s;
  }
  .cloud.c3{
    animation-duration:19s;
    animation-delay:-11s;
    opacity:.82;
  }
  @keyframes drift{
    0%,100%{transform:translateX(0);}
    50%{transform:translateX(20px);}
  }
  .loader{
    position:absolute;
    inset:0;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:24px;
  }
  .sun-bob{
    animation:sunBob 2.4s ease-in-out infinite;
  }
  .sun-breathe{
    animation:sunBreathe 2.4s ease-in-out infinite;
  }
  .sun-rays{
    transform-origin:100px 100px;
    animation:sunSpin 10s linear infinite;
  }
  .sun-face{
    transform-origin:100px 100px;
    transform:scale(.833);
  }
  .loading{
    margin-top:-38px;
    display:flex;
    align-items:flex-end;
    justify-content:center;
    gap:6px;
    color:var(--green-deep);
    font-family:Inter,"PingFang SC","Microsoft YaHei",Arial,sans-serif;
    font-size:26px;
    font-weight:700;
    letter-spacing:.5px;
  }
  .word{
    display:inline-flex;
    align-items:flex-end;
  }
  .word span{
    display:inline-block;
    animation:dotJump 2.4s ease-in-out infinite;
  }
  .dots{
    display:inline-flex;
    align-items:flex-end;
    gap:5px;
    padding-bottom:6px;
  }
  .dots span{
    width:6px;
    height:6px;
    border-radius:50%;
    background:var(--green-deep);
    animation:dotJump 2.4s ease-in-out infinite;
  }
  .word span:nth-child(1){animation-delay:0s;}
  .word span:nth-child(2){animation-delay:.08s;}
  .word span:nth-child(3){animation-delay:.16s;}
  .word span:nth-child(4){animation-delay:.24s;}
  .word span:nth-child(5){animation-delay:.32s;}
  .word span:nth-child(6){animation-delay:.40s;}
  .word span:nth-child(7){animation-delay:.48s;}
  .dots span:nth-child(1){animation-delay:.56s;}
  .dots span:nth-child(2){animation-delay:.64s;}
  .dots span:nth-child(3){animation-delay:.72s;}
  @keyframes sunSpin{to{transform:rotate(360deg);}}
  @keyframes sunBob{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
  @keyframes sunBreathe{0%,100%{transform:scale(1);}50%{transform:scale(1.05);}}
  @keyframes dotJump{0%,70%,100%{transform:translateY(0);}35%{transform:translateY(-9px);}}
  @media (prefers-reduced-motion:reduce){
    .cloud,.sun-bob,.sun-breathe,.sun-rays,.word span,.dots span{animation:none;}
  }
</style>
</head>
<body>
<div class="phone">
  <svg class="cloud-layer" viewBox="0 0 340 720" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
    <g class="cloud">
      <ellipse cx="74" cy="118" rx="34" ry="15" fill="#fff"/>
      <ellipse cx="96" cy="108" rx="22" ry="14" fill="#fff"/>
      <ellipse cx="52" cy="112" rx="18" ry="11" fill="#fff"/>
      <ellipse cx="118" cy="119" rx="16" ry="9" fill="#D7EAF9" opacity=".55"/>
    </g>
    <g class="cloud c2">
      <ellipse cx="250" cy="176" rx="26" ry="12" fill="#fff" opacity=".92"/>
      <ellipse cx="267" cy="168" rx="17" ry="10" fill="#fff" opacity=".92"/>
      <ellipse cx="228" cy="178" rx="17" ry="8" fill="#D7EAF9" opacity=".52"/>
    </g>
    <g class="cloud c3" transform="translate(-22 296)">
      <ellipse cx="74" cy="118" rx="34" ry="15" fill="#fff"/>
      <ellipse cx="96" cy="108" rx="22" ry="14" fill="#fff"/>
      <ellipse cx="52" cy="112" rx="18" ry="11" fill="#fff"/>
      <ellipse cx="118" cy="119" rx="16" ry="9" fill="#D7EAF9" opacity=".55"/>
    </g>
  </svg>

  <main class="loader" aria-live="polite" aria-busy="true">
    <div class="sun-bob">
      <div class="sun-breathe">
        <svg width="164" height="164" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <defs>
            <radialGradient id="sunFill" cx="42%" cy="38%" r="70%">
              <stop offset="0%" stop-color="#FFD25E"/>
              <stop offset="70%" stop-color="#FBB63B"/>
              <stop offset="100%" stop-color="#F6A52E"/>
            </radialGradient>
          </defs>

          <g class="sun-rays">
            <g fill="#FBC24A">
              <rect x="94.5" y="32" width="11" height="20" rx="5.5"/>
              <rect x="94.5" y="32" width="11" height="20" rx="5.5" transform="rotate(45 100 100)"/>
              <rect x="94.5" y="32" width="11" height="20" rx="5.5" transform="rotate(90 100 100)"/>
              <rect x="94.5" y="32" width="11" height="20" rx="5.5" transform="rotate(135 100 100)"/>
              <rect x="94.5" y="32" width="11" height="20" rx="5.5" transform="rotate(180 100 100)"/>
              <rect x="94.5" y="32" width="11" height="20" rx="5.5" transform="rotate(225 100 100)"/>
              <rect x="94.5" y="32" width="11" height="20" rx="5.5" transform="rotate(270 100 100)"/>
              <rect x="94.5" y="32" width="11" height="20" rx="5.5" transform="rotate(315 100 100)"/>
            </g>
          </g>

          <g class="sun-face">
            <circle cx="100" cy="100" r="49" fill="url(#sunFill)"/>
            <circle cx="100" cy="100" r="49" fill="none" stroke="#F4A02B" stroke-opacity=".35" stroke-width="3"/>
            <ellipse cx="79" cy="109" rx="8" ry="5.5" fill="#FF9C6E" opacity=".55"/>
            <ellipse cx="121" cy="109" rx="8" ry="5.5" fill="#FF9C6E" opacity=".55"/>
            <circle cx="85" cy="94" r="6" fill="#5A3B17"/>
            <circle cx="115" cy="94" r="6" fill="#5A3B17"/>
            <circle cx="87" cy="92" r="1.9" fill="#fff"/>
            <circle cx="117" cy="92" r="1.9" fill="#fff"/>
            <path d="M85 110 Q100 126 115 110" stroke="#5A3B17" stroke-width="5.5" stroke-linecap="round" fill="none"/>
          </g>
        </svg>
      </div>
    </div>

    <div class="loading" aria-label="loading">
      <span class="word">
        <span>l</span><span>o</span><span>a</span><span>d</span><span>i</span><span>n</span><span>g</span>
      </span>
      <span class="dots">
        <span></span><span></span><span></span>
      </span>
    </div>
  </main>
</div>
</body>
</html>
