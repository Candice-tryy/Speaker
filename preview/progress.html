<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Speaking · 进度</title>
<style>
  :root{
    --green:#34CC9E; --green-deep:#13A87E; --green-text:#0E7A5E;
    --coral:#FF9466; --coral-deep:#FF7B4A; --coral-text:#E06A38;
    --coral-soft:#FFEEE2;
    --ink:#3A5750; --muted:#7C9890; --faint:#B9CFC7;
    --mint-1:#EAF7F1; --mint-2:#DCEFE7; --line:#E9F2EE;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; height:100%;}
  body{background:#DCEBE6; font-family:Inter,"PingFang SC","Microsoft YaHei",Arial,sans-serif;
       color:var(--ink); display:grid; place-items:center; min-height:100vh; padding:18px;}
  .phone{width:340px; height:720px; position:relative; overflow:hidden; border-radius:38px;
    border:2px solid #fff; box-shadow:0 0 0 1px var(--line), 0 30px 70px rgba(40,90,72,.22);
    background:linear-gradient(180deg,#EEF6FB 0%,#F4FAF8 50%,#FFF8F3 100%);
    display:flex; flex-direction:column;}

  .body{flex:1;overflow-y:auto;padding:24px 20px 12px;}
  .body::-webkit-scrollbar{display:none;}
  h1{font-size:21px;font-weight:600;color:#2E4D44;margin:0 4px 2px;}
  .since{font-size:12px;color:var(--muted);margin:0 4px 16px;}

  /* streak banner */
  .streak{background:var(--coral-soft);border-radius:20px;padding:16px;display:flex;align-items:center;gap:14px;}
  .streak .flame{font-size:34px;}
  .streak .big{font-size:26px;font-weight:700;color:var(--coral-text);line-height:1;}
  .streak .lbl{font-size:12px;color:#C98A66;margin-top:3px;}

  .sectitle{font-size:12px;font-weight:600;color:var(--muted);margin:22px 4px 10px;letter-spacing:.03em;}

  /* week strip */
  .week{display:flex;justify-content:space-between;gap:6px;background:#fff;border:1px solid var(--line);
    border-radius:18px;padding:16px 14px 12px;}
  .day{display:flex;flex-direction:column;align-items:center;gap:7px;flex:1;}
  .day .bar{width:100%;max-width:22px;border-radius:7px;background:var(--mint-2);}
  .day .bar.fill{background:var(--green);}
  .day .bar.today{background:var(--coral);}
  .day .d{font-size:10px;color:var(--muted);}

  /* part progress */
  .parts{display:flex;flex-direction:column;gap:12px;}
  .part{background:#fff;border:1px solid var(--line);border-radius:18px;padding:14px 16px;}
  .part .pr{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;}
  .part .pn{font-size:14px;font-weight:600;color:#2E4D44;}
  .part .pc{font-size:12px;color:var(--muted);}
  .track{height:8px;border-radius:8px;background:var(--mint-2);overflow:hidden;}
  .track i{display:block;height:100%;border-radius:8px;background:var(--green);}

  /* band trend */
  .trend{background:#fff;border:1px solid var(--line);border-radius:18px;padding:16px;}
  .trend .row{display:flex;align-items:baseline;justify-content:space-between;}
  .trend .cur{font-size:30px;font-weight:700;color:var(--green-deep);line-height:1;}
  .trend .delta{font-size:12px;font-weight:600;color:var(--green-text);background:var(--mint-1);
    padding:3px 9px;border-radius:20px;}
  .trend .cap{font-size:12px;color:var(--muted);margin-top:6px;}
  .spark{margin-top:14px;}

  /* nav */
  .nav{display:flex;justify-content:space-around;padding:8px 8px 20px;}
  .nav a{display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--faint);
    text-decoration:none;font-size:10px;cursor:pointer;}
  .nav a.on{color:var(--green-deep);font-weight:600;}
  .nav svg{width:23px;height:23px;}
</style>
</head>
<body>
<div class="phone">
  <div class="body">
    <h1>学习进度</h1>
    <div class="since">从 2026 年 5 月开始 · 已坚持 21 天</div>

    <div class="streak">
      <div class="flame">🔥</div>
      <div>
        <div class="big">7 天</div>
        <div class="lbl">连续打卡中，别断了！</div>
      </div>
    </div>

    <div class="sectitle">本周练习</div>
    <div class="week" id="week"></div>

    <div class="sectitle">各 Part 进度</div>
    <div class="parts">
      <div class="part">
        <div class="pr"><span class="pn">Part 1</span><span class="pc">6 / 9 关</span></div>
        <div class="track"><i style="width:66%"></i></div>
      </div>
      <div class="part">
        <div class="pr"><span class="pn">Part 2</span><span class="pc">4 / 9 关</span></div>
        <div class="track"><i style="width:44%"></i></div>
      </div>
      <div class="part">
        <div class="pr"><span class="pn">Part 3</span><span class="pc">2 / 9 关</span></div>
        <div class="track"><i style="width:22%"></i></div>
      </div>
    </div>

    <div class="sectitle">考官评分趋势</div>
    <div class="trend">
      <div class="row">
        <div class="cur">6.5</div>
        <div class="delta">▲ 0.5</div>
      </div>
      <div class="cap">最近一次考官模拟 · 较上次提升 0.5</div>
      <svg class="spark" width="100%" height="64" viewBox="0 0 280 64" preserveAspectRatio="none">
        <polyline fill="none" stroke="#34CC9E" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"
          points="6,50 52,46 98,40 144,42 190,30 236,22 274,18"/>
        <circle cx="274" cy="18" r="4.5" fill="#FF9466"/>
      </svg>
    </div>
  </div>

  <div class="nav">
    <a href="climbing-map.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21l6-12 5 7 3-4 4 9z"/></svg><span>登山</span></a>
    <a href="card-practice.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="6" width="13" height="14" rx="2"/><path d="M16 8l4 1.5v9L16 20"/></svg><span>练习</span></a>
    <a class="on"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19V5M4 19h16M8 16v-5M12 16V8M16 16v-3"/></svg><span>进度</span></a>
    <a href="profile.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M5 20a7 7 0 0 1 14 0"/></svg><span>我的</span></a>
  </div>
</div>

<script>
// week activity (heights in px), last = today
const DAYS=['一','二','三','四','五','六','日'];
const H=[34,20,46,40,28,52,30];
const todayIdx=6;
const week=document.getElementById('week');
H.forEach((h,i)=>{
  const cls = i===todayIdx ? 'bar today' : (h>=26 ? 'bar fill' : 'bar');
  week.insertAdjacentHTML('beforeend',
    `<div class="day"><div class="${cls}" style="height:${h}px"></div><div class="d">${DAYS[i]}</div></div>`);
});
</script>
</body>
</html>
